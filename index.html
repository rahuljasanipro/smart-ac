<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Smart AC IoT Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>❄ Smart AC Control</h1>

<div class="header-buttons">
<button id="powerBtn">AC OFF</button>
<button id="ecoBtn">Eco Mode</button>
<button id="darkBtn">🌙</button>
</div>

</header>


<div class="grid">

<div class="card">
<h3>Room Temperature</h3>
<p id="roomTemp">30°C</p>
</div>

<div class="card">
<h3>Target Temperature</h3>
<p id="targetTempLabel">24°C</p>
<input type="range" id="tempSlider" min="16" max="30" value="24">
</div>

<div class="card">
<h3>Power Draw</h3>
<p id="powerDraw">0 kW</p>
</div>

<div class="card">
<h3>Energy Today</h3>
<p id="todayUsage">0 kWh</p>
</div>

<div class="card">
<h3>Weekly Usage</h3>
<p id="weeklyUsage">0 kWh</p>
</div>

<div class="card">
<h3>Estimated Cost</h3>
<p id="cost">₹0</p>
</div>

</div>


<div class="chartCard">

<h3>Energy Usage Analytics</h3>

<canvas id="chart"></canvas>

</div>


</body>

<script src="script.js"></script>

</html>
